<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Gabriel De Melo Silva</title>
    <style>
        body {
            background-image: url('meufundo.png');
            
          
            background-size: cover;
            
            
            background-position: center center;
            
           
            background-repeat: no-repeat;
            
            
            background-attachment: fixed;

            
            background-color: #121212;

            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px; 
            text-align: center; 
        }
        
        
        .bloco-redes {
            display: flex;
            gap: 25px;       
            justify-content: center;
            align-items: center; 
            margin-top: 30px;
        }

        
        .bloco-redes a i, .bloco-redes a img {
            font-size: 40px;     
            width: 40px;
            height: 40px;
            transition: 0.3s;     
        }

      
        .bloco-redes a:hover i, .bloco-redes a:hover img {
            transform: scale(1.2); 
        }

      
        .link-instagram i {
            color: #E1306C;      
        }
        .link-instagram i:hover {
            color: #B12352;      
        }

      
        .link-tiktok i {
            color: #00f2fe;  
        }
        .link-tiktok i:hover {
            color: #fe0979; 
        }


        .link-linkedin i {
            color: #0077B5;
        }
        .link-linkedin i:hover {
            color: #005582;       
        }

    
        .link-github i {
            color: #ffffff;
        }
        .link-github i:hover {
            color: #adb5bd;
        }

       
        .link-letterboxd img {
            
            filter: invert(53%) sepia(93%) saturate(1754%) hue-rotate(113deg) brightness(97%) contrast(105%);
        }
        .link-letterboxd:hover img {

            filter: invert(55%) sepia(81%) saturate(2971%) hue-rotate(12deg) brightness(101%) contrast(101%);
        }
    </style>

</head>
<body>

    <h3>Olá, meu nome é Gabriel De Melo Silva, tenho 16 anos e estou aprendendo sobre programação.</h3>
    <h2>Conheça minhas redes sociais</h2>
    
    <div class="bloco-redes">
        <a href="https://www.instagram.com/g_sbriel/" target="_blank" class="link-instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
        
        <a href="https://www.linkedin.com/in/gabriel-melo-silva-404a21385?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" class="link-linkedin">
            <i class="fa-brands fa-linkedin"></i>
        </a>

        <a href="https://www.tiktok.com/@.gsbriel?_r=1&_t=ZS-97GtM3Hgq7m" target="_blank" class="link-tiktok">
            <i class="fa-brands fa-tiktok"></i>
        </a>

        <a href="https://github.com/melo2607" target="_blank" class="link-github">
            <i class="fa-brands fa-github"></i>
        </a>

        <a href="https://boxd.it/fHchF" target="_blank" class="link-letterboxd">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/letterboxd.svg" alt="Letterboxd">
        </a>
    </div>

</body>
</html>
