<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Gabriel De Melo Silva</title>
        <style>
        body {
            background-image: url('meufundo.png');
            
            /* Faz a imagem cobrir toda a tela sem distorcer */
            background-size: cover;
            
            /* Centraliza a imagem na página */
            background-position: center center;
            
            /* Impede que a imagem se repita como um mosaico */
            background-repeat: no-repeat;
            
            /* Mantém o fundo fixo enquanto o usuário rola a página */
            background-attachment: fixed;

            /* Cor de fundo escura de segurança para destacar textos e o ícone do GitHub */
            background-color: #121212;

            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px; /* Um espaço nas bordas para não colar na tela */
            text-align: center; /* Centraliza os textos e os ícones */
        }
        
        /* Centraliza o bloco de redes sociais na tela */
        .bloco-redes {
            display: flex;
            gap: 25px;       
            justify-content: center;
            align-items: center; 
            margin-top: 30px;
        }

        /* Configuração geral dos ícones */
        .bloco-redes a i {
            font-size: 40px;     
            transition: 0.3s;     
        }

        .bloco-redes a i:hover {
            transform: scale(1.2); /* Aumenta um pouquinho ao passar o mouse */
        }

        /* INSTAGRAM */
        .link-instagram i {
            color: #E1306C;      
        }
        .link-instagram i:hover {
            color: #B12352;      
        }

        /* TIKTOK */
        .link-tiktok i {
            color: #00f2fe; /* Mudei para azul claro para destacar no fundo escuro */    
        }
        .link-tiktok i:hover {
            color: #fe0979; /* Efeito hover rosa marcante do TikTok */
        }

        /* LINKEDIN */
        .link-linkedin i {
            color: #0077B5;
        }
        .link-linkedin i:hover {
            color: #005582;       
        }

        /* GITHUB */
        .link-github i {
            color: #ffffff;
        }
        .link-github i:hover {
            color: #adb5bd;
        }

        /* LETTERBOXD */
        .link-letterboxd i {
            color: #00e054;    
        }
        .link-letterboxd i:hover {
            color: #ff8000; 
        }
    </style>

</head>
<body>

    <h3>Olá, meu nome é Gabriel De Melo Silva, tenho 16 anos e estou aprendendo sobre programação.</h3>
    <h2>Conheça minhas redes sociais</h2>
    
    <div class="bloco-redes">
        <a href="https://www.instagram.com/g_sbriel/" target="_blank" class="link-instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
        
        <a href="https://www.linkedin.com/in/gabriel-melo-silva-404a21385?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" class="link-linkedin">
            <i class="fa-brands fa-linkedin"></i>
        </a>

        <a href="https://www.tiktok.com/@.gsbriel?_r=1&_t=ZS-97GtM3Hgq7m" target="_blank" class="link-tiktok">
            <i class="fa-brands fa-tiktok"></i>
        </a>

        <a href="https://github.com/melo2607" target="_blank" class="link-github">
            <i class="fa-brands fa-github"></i>
        </a>

        <a href="https://boxd.it/fHchF" target="_blank" class="link-letterboxd"> 
            <i class="fa-solid fa-film"></i> </a>
        </a>
    </div>

</body>
</html>
